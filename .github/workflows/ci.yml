name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest test_app.py -v

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build container
        run: docker build -t bulb-voice:test .

      - name: Start container
        run: |
          docker run -d --name bulb-test --network host bulb-voice:test
          sleep 5

      - name: Health check
        run: |
          STATUS=$(curl -sf http://localhost:8000/api/status | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['device_connected'])")
          echo "Device connected: $STATUS"
          # App should start even without DLNA devices
          curl -sf http://localhost:8000/ > /dev/null
          echo "Web UI: OK"
          curl -sf http://localhost:8000/api/status > /dev/null
          echo "Status API: OK"
          curl -sf http://localhost:8000/api/devices > /dev/null
          echo "Devices API: OK"
          curl -sf http://localhost:8000/api/logs > /dev/null
          echo "Logs API: OK"

      - name: Test search API
        run: |
          # Search should work (yt-dlp is installed in container)
          RESULT=$(curl -sf -X POST http://localhost:8000/api/search \
            -H "Content-Type: application/json" \
            -d '{"query": "test", "max_results": 1}')
          echo "Search response: $RESULT"
          echo "$RESULT" | python3 -c "import json,sys; d=json.load(sys.stdin); assert 'results' in d; print(f'Search: OK ({len(d[\"results\"])} results)')"

      - name: Stop container
        if: always()
        run: docker rm -f bulb-test 2>/dev/null || true

  publish:
    runs-on: ubuntu-latest
    needs: [test, docker]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase repo name
        id: repo
        run: echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ steps.repo.outputs.name }}:latest
            ghcr.io/${{ steps.repo.outputs.name }}:${{ github.sha }}
